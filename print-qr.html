<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Cetak Kartu QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: #fff; margin: 0; }

    @media print {
      .no-print { display: none !important; }
      body { margin: 0; padding: 0; }
      .print-grid { gap: 8px !important; padding: 8px !important; }
      .card-wrapper { break-inside: avoid; }
    }

    .print-grid {
      display: flex; flex-wrap: wrap; gap: 16px;
      padding: 20px; justify-content: center;
    }

    /* ============ WRAPPER (front + back side-by-side) ============ */
    .card-wrapper {
      display: flex; gap: 6px; align-items: flex-start;
    }
    .card-label {
      font-size: 7px; text-align: center; color: #aaa;
      font-family: 'Quicksand', sans-serif; margin-top: 2px;
    }

    /* ============ FRONT SIDE ============ */
    .card-front {
      width: 85.6mm; height: 53.98mm;
      border: 2px solid #4CC9F0;
      border-radius: 16px;
      display: flex; overflow: hidden;
      position: relative;
      background: #fff;
    }

    /* Polkadot pattern overlay on the right side */
    .card-front::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 60%; height: 100%;
      background-image: radial-gradient(circle, rgba(58,134,255,0.06) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
      pointer-events: none;
    }

    /* Star decorations */
    .card-front::after {
      content: '⭐✨';
      position: absolute; top: 5px; right: 8px;
      font-size: 10px; opacity: 0.7;
    }

    .card-front .qr-zone {
      width: 40%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px;
      background: linear-gradient(170deg, #4CC9F0 0%, #3A86FF 60%, #7B2FF7 100%);
      gap: 4px; position: relative;
    }
    .card-front .qr-zone::before {
      content: '⭐'; position: absolute; top: 6px; left: 6px;
      font-size: 8px; opacity: 0.6;
    }
    .card-front .qr-zone::after {
      content: '✨'; position: absolute; bottom: 8px; right: 6px;
      font-size: 8px; opacity: 0.5;
    }
    .card-front .qr-zone img {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      border-radius: 10px; background: #fff;
      padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .card-front .qr-zone .qr-id {
      color: #fff; font-size: 9px; font-weight: 700;
      letter-spacing: 1px; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .card-front .info-zone {
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 14px 8px; position: relative; z-index: 1;
    }
    .card-front .brand {
      display: flex; align-items: center; gap: 5px;
    }
    .card-front .brand .mascot { font-size: 22px; }
    .card-front .brand .title {
      font-size: 18px; font-weight: 800; color: #3A86FF;
      letter-spacing: -0.5px;
    }
    .card-front .subtitle {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 8px; color: #999; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 6px;
    }
    .card-front .field-label {
      font-size: 9px; color: #3A86FF; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .card-front .field-line {
      border-bottom: 2px dotted #4CC9F0;
      height: 18px; margin-bottom: 3px;
    }
    .card-front .footer-text {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 7px; color: #bbb; margin-top: auto;
      display: flex; align-items: center; gap: 3px;
    }
    .card-front .footer-text .dot {
      width: 3px; height: 3px; background: #4CC9F0;
      border-radius: 50%; display: inline-block;
    }

    /* ============ BACK SIDE ============ */
    .card-back {
      width: 85.6mm; height: 53.98mm;
      border-radius: 16px; overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #FFD60A 0%, #FF9F1C 35%, #F72585 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 14px; text-align: center;
      color: #fff;
    }
    .card-back::before {
      content: '🪙'; position: absolute; top: 6px; left: 8px;
      font-size: 14px; opacity: 0.6;
    }
    .card-back::after {
      content: '🏆'; position: absolute; top: 6px; right: 8px;
      font-size: 12px; opacity: 0.6;
    }

    .card-back .back-mascot { font-size: 28px; margin-bottom: 2px; }
    .card-back .back-tagline {
      font-size: 14px; font-weight: 800; color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 1px;
    }
    .card-back .back-subtagline {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 8px; color: rgba(255,255,255,0.9);
      margin-bottom: 6px;
    }
    .card-back .steps {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    }
    .card-back .step-bubble {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      padding: 3px 8px;
      font-size: 8px; font-weight: 700; color: #fff;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .card-back .back-footer {
      position: absolute; bottom: 5px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 7px; color: rgba(255,255,255,0.6);
    }

    /* Bottom corner decorations */
    .back-deco-left {
      position: absolute; bottom: 4px; left: 8px;
      font-size: 10px; opacity: 0.5;
    }
    .back-deco-right {
      position: absolute; bottom: 4px; right: 8px;
      font-size: 10px; opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="no-print container" style="padding:20px 20px 0;">
    <div class="flex-between">
      <h1 class="h2" style="font-family:'Quicksand',sans-serif;">🖨️ Cetak Kartu QR</h1>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    </div>
    <p class="caption text-secondary" style="margin-top:8px;font-family:'Nunito Sans',sans-serif;">
      ✂️ Gunting di tepi kartu → Siswa isi nama & kelas dengan pulpen/spidol → Laminating!
    </p>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
  </div>

  <div class="print-grid" id="qrGrid">
    <div class="loading-state"><div class="spinner"></div><p>Generating QR codes...</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    (function() {
      const BASE_URL = window.location.origin;
      const grid = document.getElementById('qrGrid');
      const qrIds = JSON.parse(sessionStorage.getItem('celdig_print_qrs') || '[]');

      if (!qrIds.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;font-family:Quicksand,sans-serif;">Tidak ada QR Code untuk dicetak.<br>Generate dari halaman Admin terlebih dahulu.</p>';
        return;
      }

      grid.innerHTML = '';

      qrIds.forEach((id) => {
        const url = `${BASE_URL}/s/${id}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(url)}&color=2B2D42`;

        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `
          <!-- FRONT SIDE -->
          <div>
            <div class="card-front">
              <div class="qr-zone">
                <img src="${qrImgUrl}" alt="QR ${id}">
              </div>
              <div class="info-zone">
                <div class="brand">
                  <span class="mascot">🐱</span>
                  <span class="title">CELDIG</span>
                </div>
                <div class="subtitle">Celengan Digital</div>
                <div class="field-label">Nama:</div>
                <div class="field-line"></div>
                <div class="field-label">Kelas:</div>
                <div class="field-line"></div>

              </div>
            </div>
            <div class="card-label">▲ DEPAN</div>
          </div>

          <!-- BACK SIDE -->
          <div>
            <div class="card-back">
              <div class="back-mascot">🐱💰</div>
              <div class="back-tagline">Menabung Itu Seru! 🎉</div>
              <div class="back-deco-left">⭐✨</div>
              <div class="back-deco-right">🌟🪙</div>
            </div>
            <div class="card-label">▲ BELAKANG</div>
          </div>
        `;
        grid.appendChild(wrapper);
      });
    })();
  </script>
</body>
</html>
