<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Cetak QR Code</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background:#fff;">
  <div class="no-print container" style="padding:20px 20px 0;">
    <div class="flex-between">
      <h1 class="h2">🖨️ Cetak QR Code</h1>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    </div>
    <p class="caption text-secondary" style="margin-top:8px;">Gunting di garis putus-putus, lalu tempelkan ke celengan dan kartu saku siswa.</p>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
  </div>

  <div class="print-grid" id="qrGrid">
    <div class="loading-state"><div class="spinner"></div><p>Generating QR codes...</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    (function() {
      const BASE_URL = window.location.origin;
      const grid = document.getElementById('qrGrid');

      const qrIds = JSON.parse(sessionStorage.getItem('celdig_print_qrs') || '[]');

      if (!qrIds.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">Tidak ada QR Code untuk dicetak. Generate dari halaman Admin terlebih dahulu.</p>';
        return;
      }

      grid.innerHTML = '';

      qrIds.forEach((id) => {
        const url = `${BASE_URL}/s/${id}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}&color=2B2D42`;

        const card = document.createElement('div');
        card.className = 'qr-card-print';
        card.innerHTML = `
          <div style="display:flex;justify-content:center;">
            <img src="${qrImgUrl}" alt="QR ${id}" width="160" height="160" style="image-rendering:pixelated;">
          </div>
          <p class="qr-id">${id}</p>
          <p class="qr-label">Nama: _______________</p>
          <p class="qr-label" style="margin-top:2px;">CELDIG • Celengan Digital</p>
        `;
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
