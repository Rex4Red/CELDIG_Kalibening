<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Cetak Kartu QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&family=Nunito+Sans:wght@400;600&family=Be+Vietnam+Pro:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: #fff; margin: 0; }

    @media print {
      .no-print { display: none !important; }
      body { margin: 0; padding: 0; }
      .print-grid { gap: 10px !important; padding: 8px !important; }
      .card-wrapper { break-inside: avoid; }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }

    .print-grid {
      display: flex; flex-wrap: wrap; gap: 16px;
      padding: 20px; justify-content: center;
    }

    /* ============ WRAPPER ============ */
    .card-wrapper {
      display: flex; gap: 8px; align-items: flex-start;
    }
    .card-label {
      font-size: 7px; text-align: center; color: #bbb;
      font-family: 'Nunito Sans', sans-serif; margin-top: 3px;
    }

    /* ============ SHARED SIZE ============ */
    .card-front, .card-back {
      width: 85.6mm; height: 53.98mm;
      border-radius: 14px; overflow: hidden;
      position: relative;
    }

    /* ============ FRONT SIDE ============ */
    .card-front {
      border: 2px solid #4CC9F0;
      display: flex; background: #fff;
    }
    .card-front::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 60%; height: 100%;
      background-image: radial-gradient(circle, rgba(58,134,255,0.05) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
      pointer-events: none;
    }
    .card-front::after {
      content: '⭐✨';
      position: absolute; top: 5px; right: 8px;
      font-size: 9px; opacity: 0.6;
    }

    .card-front .qr-zone {
      width: 40%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px;
      background: linear-gradient(170deg, #4CC9F0 0%, #3A86FF 60%, #7B2FF7 100%);
      position: relative;
    }
    .card-front .qr-zone::before {
      content: '⭐'; position: absolute; top: 6px; left: 6px;
      font-size: 7px; opacity: 0.5;
    }
    .card-front .qr-zone::after {
      content: '✨'; position: absolute; bottom: 8px; right: 6px;
      font-size: 7px; opacity: 0.4;
    }
    .card-front .qr-zone img {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      border-radius: 10px; background: #fff;
      padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .card-front .info-zone {
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 14px 8px; position: relative; z-index: 1;
    }
    .card-front .brand {
      display: flex; align-items: center; gap: 5px;
    }
    .card-front .brand .mascot { font-size: 20px; }
    .card-front .brand .title {
      font-size: 18px; font-weight: 800; color: #3A86FF;
      letter-spacing: -0.5px;
    }
    .card-front .subtitle {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 7.5px; color: #aaa; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .card-front .field-label {
      font-size: 9px; color: #3A86FF; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .card-front .field-line {
      border-bottom: 2px dotted #4CC9F0;
      height: 18px; margin-bottom: 4px;
    }

    /* ============ BACK SIDE (NEW DESIGN) ============ */
    .card-back {
      background: linear-gradient(135deg, #FFD60A 0%, #FF9F1C 50%, #F72585 100%);
      display: flex; flex-direction: row;
      align-items: stretch;
      padding: 0; color: #fff;
      border: 3px solid #fff;
    }
    /* Dot pattern overlay */
    .card-back::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.3) 1.5px, transparent 1.5px);
      background-size: 14px 14px;
      pointer-events: none; z-index: 0;
    }

    /* — Left: Mascot & Tagline — */
    .back-left {
      width: 42%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 6px; position: relative; z-index: 1;
    }
    .back-mascot-img {
      width: 72px; height: 72px; object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.18));
    }
    .back-tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px; font-weight: 800; color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      text-align: center; line-height: 1.25;
      margin-top: 4px;
    }
    .back-subtitle-pill {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 6.5px; color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.12);
      border-radius: 20px; padding: 2px 7px;
      margin-top: 3px; white-space: nowrap;
      backdrop-filter: blur(2px);
    }

    /* Decorative coins & stars */
    .deco-coin-tl {
      position: absolute; top: 5px; left: 5px; width: 18px; height: 18px;
      opacity: 0.7; z-index: 2; object-fit: contain;
    }
    .deco-star-tr {
      position: absolute; top: 5px; right: 5px;
      font-size: 14px; opacity: 0.75; z-index: 2;
      color: #FFE171;
    }
    .deco-star-bl {
      position: absolute; bottom: 5px; left: 6px;
      font-size: 12px; opacity: 0.55; z-index: 2;
      color: #fff;
    }
    .deco-coin-br {
      position: absolute; bottom: 6px; right: 50px; width: 20px; height: 20px;
      opacity: 0.65; z-index: 2; object-fit: contain;
      transform: rotate(12deg);
    }

    /* — Right: Instructions Box — */
    .back-right {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 7px 8px 7px 4px;
      position: relative; z-index: 1;
    }
    .back-instructions {
      background: rgba(255,255,255,0.93);
      border-radius: 10px; padding: 7px 9px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .back-instructions .instr-title {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 8.5px; font-weight: 700; color: #0058BD;
      display: flex; align-items: center; gap: 3px;
      margin-bottom: 5px;
    }
    .back-instructions .instr-title .material-symbols-outlined {
      font-size: 12px; color: #0058BD;
    }
    .back-instructions .step-list {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-direction: column; gap: 3px;
    }
    .back-instructions .step-item {
      display: flex; align-items: center; gap: 5px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 7px; color: #414754;
    }
    .step-num {
      width: 14px; height: 14px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 6.5px; font-weight: 700; flex-shrink: 0;
    }
    .step-num-blue {
      background: #5ED8FF; color: #005C72;
    }
    .step-num-gold {
      background: #FFE171; color: #554600;
    }
    .step-item-highlight {
      font-weight: 700; color: #0058BD;
    }

    /* — Footer strip — */
    .back-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.1);
      padding: 2.5px 0; text-align: center; z-index: 3;
      backdrop-filter: blur(2px);
    }
    .back-footer span {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 5.5px; color: rgba(255,255,255,0.8);
      text-transform: uppercase; letter-spacing: 1.2px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="no-print container" style="padding:20px 20px 0;">
    <div class="flex-between">
      <h1 class="h2" style="font-family:'Quicksand',sans-serif;">🖨️ Cetak Kartu QR</h1>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    </div>
    <p class="caption text-secondary" style="margin-top:8px;font-family:'Nunito Sans',sans-serif;">
      ✂️ Gunting → Tempel depan &amp; belakang → Laminating!
    </p>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
  </div>

  <div class="print-grid" id="qrGrid">
    <div class="loading-state"><div class="spinner"></div><p>Generating QR codes...</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    (function() {
      const BASE_URL = window.location.origin;
      const grid = document.getElementById('qrGrid');
      const qrIds = JSON.parse(sessionStorage.getItem('celdig_print_qrs') || '[]');

      if (!qrIds.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;font-family:Quicksand,sans-serif;">Tidak ada QR Code untuk dicetak.<br>Generate dari halaman Admin terlebih dahulu.</p>';
        return;
      }

      // Coin image URL from the reference design
      const coinImg = 'https://lh3.googleusercontent.com/aida-public/AB6AXuBZz2ZD2_QZ2w5J26s8JPFuUvEnB33LWeUm5X8Kk8lNb8OvLXSHR1o6b-vSB6kRsgIMX9h2E5ikjaL5l2jf4hnx1vQ_6HL--ugsK0SJS0DHIKXpAQPFbVgtPuOKwwG8AlzPfjlPLoCG2Yebd4Q52OEftfjDtCOJBakce3nyHM7cC6Vp19-GF3kYn3p3qhVv2ZOiWVJzFQa5n8mijlGE0FlNeKuiqiU5yuSxODOiyFEDx_NpC1Nm-OIDuw';
      // Cat mascot image URL from the reference design
      const mascotImg = 'https://lh3.googleusercontent.com/aida-public/AB6AXuBxXWQzib596xfoO6iUIJQxuRLr2x2F0RV2rXl0W1vV8oCHVdhQYE21o8PQdIGfKuia8ELHjsF5vFwIq651kZHoBbsGOx2Q7_dkU_crFLp7LNJczYu1lwNDp8Sy8ZHqTZa6RcSYLxJZ9ha9pDW_Xek3sNWspsWx_AU4cBqTd7VNhzi_QQsUpsH0aRvHRGqdz6rQINAuxzrH34GvRLxEGwOzzru4lzVonfUtgL7X55HU4quCK1PCWytpauooRpq_2fs_z5Q';

      grid.innerHTML = '';

      qrIds.forEach((id) => {
        const url = `${BASE_URL}/s/${id}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(url)}&color=2B2D42`;

        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `
          <div>
            <div class="card-front">
              <div class="qr-zone">
                <img src="${qrImgUrl}" alt="QR ${id}">
              </div>
              <div class="info-zone">
                <div class="brand">
                  <span class="mascot">🐱</span>
                  <span class="title">CELDIG</span>
                </div>
                <div class="subtitle">Celengan Digital</div>
                <div class="field-label">Nama:</div>
                <div class="field-line"></div>
                <div class="field-label">Kelas:</div>
                <div class="field-line"></div>
              </div>
            </div>
            <div class="card-label">▲ DEPAN</div>
          </div>

          <div>
            <div class="card-back">
              <!-- Decorative elements -->
              <img class="deco-coin-tl" src="${coinImg}" alt="">
              <span class="deco-star-tr material-symbols-outlined" style='font-variation-settings:"FILL" 1;'>star</span>
              <span class="deco-star-bl material-symbols-outlined" style='font-variation-settings:"FILL" 1;'>stars</span>
              <img class="deco-coin-br" src="${coinImg}" alt="">

              <!-- Left: Mascot + Tagline -->
              <div class="back-left">
                <img class="back-mascot-img" src="${mascotImg}" alt="Mascot">
                <div class="back-tagline">Menabung<br>Itu Seru! 🎉</div>
                <div class="back-subtitle-pill">Kumpulkan ⭐ setiap menabung!</div>
              </div>

              <!-- Right: Instructions Box -->
              <div class="back-right">
                <div class="back-instructions">
                  <div class="instr-title">
                    <span class="material-symbols-outlined" style='font-variation-settings:"FILL" 1;'>info</span>
                    Cara Pakai
                  </div>
                  <ul class="step-list">
                    <li class="step-item">
                      <div class="step-num step-num-blue">1</div>
                      <span>Scan QR Code pada kartu</span>
                    </li>
                    <li class="step-item">
                      <div class="step-num step-num-blue">2</div>
                      <span>Isi data dengan benar</span>
                    </li>
                    <li class="step-item">
                      <div class="step-num step-num-blue">3</div>
                      <span>Setor tabungan ke petugas</span>
                    </li>
                    <li class="step-item">
                      <div class="step-num step-num-gold">4</div>
                      <span class="step-item-highlight">Dapat bintang! ⭐</span>
                    </li>
                  </ul>
                </div>
              </div>

              <!-- Footer strip -->
              <div class="back-footer">
                <span>celdig-kalibening.vercel.app</span>
              </div>
            </div>
            <div class="card-label">▲ BELAKANG</div>
          </div>
        `;
        grid.appendChild(wrapper);
      });
    })();
  </script>
</body>
</html>
