<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Cetak QR Code</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; margin: 0; padding: 0; }
    }

    .print-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 20px;
      justify-content: center;
    }

    .qr-card-print {
      width: 85.6mm; height: 53.98mm;
      border: 1.5px dashed #ccc;
      border-radius: 12px;
      display: flex;
      overflow: hidden;
      page-break-inside: avoid;
      box-sizing: border-box;
    }

    .qr-card-print .card-left {
      width: 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: linear-gradient(180deg, #4CC9F0 0%, #3A86FF 100%);
      gap: 4px;
    }
    .qr-card-print .card-left img {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      border-radius: 6px;
      background: #fff;
      padding: 4px;
    }
    .qr-card-print .card-left .qr-id-label {
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .qr-card-print .card-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      gap: 3px;
    }
    .qr-card-print .card-brand {
      font-size: 14px; font-weight: 800; color: #3A86FF;
      display: flex; align-items: center; gap: 4px;
    }
    .qr-card-print .card-subtitle {
      font-size: 8px; color: #999; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .qr-card-print .card-field {
      font-size: 9px; color: #666; font-weight: 500;
    }
    .qr-card-print .card-line {
      border-bottom: 1.5px dotted #ccc;
      height: 16px;
      margin-bottom: 2px;
    }
    .qr-card-print .card-footer {
      font-size: 7px; color: #aaa; margin-top: auto;
    }
  </style>
</head>
<body style="background:#fff;">
  <div class="no-print container" style="padding:20px 20px 0;">
    <div class="flex-between">
      <h1 class="h2">🖨️ Cetak Kartu QR</h1>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    </div>
    <p class="caption text-secondary" style="margin-top:8px;">Gunting di garis putus-putus. Siswa mengisi nama & kelas sendiri dengan pulpen/spidol.</p>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
  </div>

  <div class="print-grid" id="qrGrid">
    <div class="loading-state"><div class="spinner"></div><p>Generating QR codes...</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    (function() {
      const BASE_URL = window.location.origin;
      const grid = document.getElementById('qrGrid');
      const qrIds = JSON.parse(sessionStorage.getItem('celdig_print_qrs') || '[]');

      if (!qrIds.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">Tidak ada QR Code untuk dicetak. Generate dari halaman Admin terlebih dahulu.</p>';
        return;
      }

      grid.innerHTML = '';

      qrIds.forEach((id) => {
        const url = `${BASE_URL}/s/${id}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(url)}&color=2B2D42`;

        const card = document.createElement('div');
        card.className = 'qr-card-print';
        card.innerHTML = `
          <div class="card-left">
            <img src="${qrImgUrl}" alt="QR ${id}">
            <div class="qr-id-label">${id}</div>
          </div>
          <div class="card-right">
            <div class="card-brand">🐱 CELDIG</div>
            <div class="card-subtitle">Celengan Digital</div>
            <div class="card-field">Nama:</div>
            <div class="card-line"></div>
            <div class="card-field">Kelas:</div>
            <div class="card-line"></div>
            <div class="card-footer">SD N Kalibening • Tabungan Siswa</div>
          </div>
        `;
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
