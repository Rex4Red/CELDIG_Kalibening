<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Cetak Kartu QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: #fff; margin: 0; }

    @media print {
      .no-print { display: none !important; }
      body { margin: 0; padding: 0; }
      .print-grid { padding: 6mm !important; }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }

    .print-grid {
      display: flex; flex-wrap: wrap; gap: 20px;
      padding: 20px; justify-content: center;
    }

    /* ============ CARD PAIR (front + fold + back) ============ */
    .card-pair {
      display: flex; align-items: stretch;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Fold line in the middle */
    .fold-line {
      width: 0;
      border-left: 1.5px dashed #ccc;
      position: relative;
    }
    .fold-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      font-size: 6px; color: #bbb;
      white-space: nowrap;
      font-family: 'Nunito Sans', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Corner cut marks */
    .card-pair::before,
    .card-pair::after {
      content: ''; position: absolute;
    }

    /* ============ SHARED CARD SIZE ============ */
    .card-front, .card-back {
      width: 85.6mm; height: 53.98mm;
      overflow: hidden; position: relative;
    }

    /* ============ FRONT SIDE ============ */
    .card-front {
      border: 1.5px solid #e0e0e0;
      border-right: none;
      border-radius: 12px 0 0 12px;
      display: flex;
      background: #fff;
    }

    .card-front::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 60%; height: 100%;
      background-image: radial-gradient(circle, rgba(58,134,255,0.05) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
      pointer-events: none;
    }
    .card-front::after {
      content: '⭐✨';
      position: absolute; top: 5px; right: 8px;
      font-size: 9px; opacity: 0.6;
    }

    .card-front .qr-zone {
      width: 40%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px;
      background: linear-gradient(170deg, #4CC9F0 0%, #3A86FF 60%, #7B2FF7 100%);
      position: relative;
    }
    .card-front .qr-zone::before {
      content: '⭐'; position: absolute; top: 6px; left: 6px;
      font-size: 7px; opacity: 0.5;
    }
    .card-front .qr-zone::after {
      content: '✨'; position: absolute; bottom: 8px; right: 6px;
      font-size: 7px; opacity: 0.4;
    }
    .card-front .qr-zone img {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      border-radius: 10px; background: #fff;
      padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .card-front .info-zone {
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 14px 8px; position: relative; z-index: 1;
    }
    .card-front .brand {
      display: flex; align-items: center; gap: 5px;
    }
    .card-front .brand .mascot { font-size: 20px; }
    .card-front .brand .title {
      font-size: 18px; font-weight: 800; color: #3A86FF;
      letter-spacing: -0.5px;
    }
    .card-front .subtitle {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 7.5px; color: #aaa; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .card-front .field-label {
      font-size: 9px; color: #3A86FF; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .card-front .field-line {
      border-bottom: 2px dotted #4CC9F0;
      height: 18px; margin-bottom: 4px;
    }

    /* ============ BACK SIDE ============ */
    .card-back {
      border: 1.5px solid #e0e0e0;
      border-left: none;
      border-radius: 0 12px 12px 0;
      background: linear-gradient(135deg, #FFD60A 0%, #FF9F1C 35%, #F72585 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 14px; text-align: center;
      color: #fff;
    }
    .card-back::before {
      content: '🪙'; position: absolute; top: 6px; left: 8px;
      font-size: 12px; opacity: 0.5;
    }
    .card-back::after {
      content: '🏆'; position: absolute; top: 6px; right: 8px;
      font-size: 11px; opacity: 0.5;
    }

    .card-back .back-mascot { font-size: 30px; margin-bottom: 2px; }
    .card-back .back-tagline {
      font-size: 15px; font-weight: 800; color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .back-deco-left {
      position: absolute; bottom: 5px; left: 8px;
      font-size: 9px; opacity: 0.45;
    }
    .back-deco-right {
      position: absolute; bottom: 5px; right: 8px;
      font-size: 9px; opacity: 0.45;
    }

    /* ============ GUIDE TEXT ============ */
    .card-guide {
      width: 100%; text-align: center;
      font-size: 7px; color: #ccc;
      font-family: 'Nunito Sans', sans-serif;
      margin-top: 2px; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="no-print container" style="padding:20px 20px 0;">
    <div class="flex-between">
      <h1 class="h2" style="font-family:'Quicksand',sans-serif;">🖨️ Cetak Kartu QR</h1>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    </div>
    <p class="caption text-secondary" style="margin-top:8px;font-family:'Nunito Sans',sans-serif;">
      ✂️ Gunting tepi luar → Lipat di garis tengah → Lem/Laminating!
    </p>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
  </div>

  <div class="print-grid" id="qrGrid">
    <div class="loading-state"><div class="spinner"></div><p>Generating QR codes...</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    (function() {
      const BASE_URL = window.location.origin;
      const grid = document.getElementById('qrGrid');
      const qrIds = JSON.parse(sessionStorage.getItem('celdig_print_qrs') || '[]');

      if (!qrIds.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;font-family:Quicksand,sans-serif;">Tidak ada QR Code untuk dicetak.<br>Generate dari halaman Admin terlebih dahulu.</p>';
        return;
      }

      grid.innerHTML = '';

      qrIds.forEach((id) => {
        const url = `${BASE_URL}/s/${id}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(url)}&color=2B2D42`;

        const container = document.createElement('div');
        container.innerHTML = `
          <div class="card-pair">
            <!-- FRONT -->
            <div class="card-front">
              <div class="qr-zone">
                <img src="${qrImgUrl}" alt="QR ${id}">
              </div>
              <div class="info-zone">
                <div class="brand">
                  <span class="mascot">🐱</span>
                  <span class="title">CELDIG</span>
                </div>
                <div class="subtitle">Celengan Digital</div>
                <div class="field-label">Nama:</div>
                <div class="field-line"></div>
                <div class="field-label">Kelas:</div>
                <div class="field-line"></div>
              </div>
            </div>

            <!-- FOLD LINE -->
            <div class="fold-line">
              <div class="fold-label">✂ lipat sini</div>
            </div>

            <!-- BACK -->
            <div class="card-back">
              <div class="back-mascot">🐱💰</div>
              <div class="back-tagline">Menabung Itu Seru! 🎉</div>
              <div class="back-deco-left">⭐✨</div>
              <div class="back-deco-right">🌟🪙</div>
            </div>
          </div>
          <div class="card-guide">✂ gunting tepi luar → lipat tengah → laminating</div>
        `;
        grid.appendChild(container);
      });
    })();
  </script>
</body>
</html>
