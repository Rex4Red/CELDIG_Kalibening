<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Cetak Kartu QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&family=Nunito+Sans:wght@400;600&family=Be+Vietnam+Pro:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Quicksand', sans-serif; background: #fff; }

    @media print {
      .no-print { display: none !important; }
      body { margin: 0; padding: 0; }
      .print-grid { gap: 10px !important; padding: 8px !important; }
      .card-wrapper { break-inside: avoid; }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }

    .print-grid {
      display: flex; flex-wrap: wrap; gap: 16px;
      padding: 20px; justify-content: center;
    }

    /* ============ WRAPPER ============ */
    .card-wrapper {
      display: flex; gap: 8px; align-items: flex-start;
    }
    .card-label {
      font-size: 7px; text-align: center; color: #bbb;
      font-family: 'Nunito Sans', sans-serif; margin-top: 3px;
    }

    /* ============ SHARED SIZE (CR80) ============ */
    .card-front, .card-back {
      width: 85.6mm; height: 53.98mm;
      border-radius: 14px; overflow: hidden;
      position: relative;
    }

    /* ====================================================
       FRONT SIDE — Full cyan/blue background ATM card
       Matching the SVG reference design
       ==================================================== */
    .card-front {
      background: linear-gradient(135deg, #4CC9F0 0%, #3A86FF 60%, #7B2FF7 100%);
      display: flex; flex-direction: row;
      align-items: stretch;
      border: 3px solid #4CC9F0;
      color: #fff;
    }
    /* Dot pattern overlay on front */
    .card-front::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.15) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
      pointer-events: none; z-index: 0;
    }

    /* — Front: QR zone (left ~38%) — */
    .front-qr-zone {
      width: 38%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px;
      position: relative; z-index: 1;
    }
    .front-qr-zone img.qr-img {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      border-radius: 10px; background: #fff;
      padding: 5px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    }
    .front-qr-label {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 6px; color: rgba(255,255,255,0.7);
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 4px;
    }

    /* — Front: Info zone (right ~62%) — */
    .front-info-zone {
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 14px 8px; position: relative; z-index: 1;
    }
    .front-brand {
      display: flex; align-items: center; gap: 5px;
    }
    .front-brand .mascot-emoji { font-size: 22px; }
    .front-brand .brand-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .front-subtitle {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 7px; color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .front-field-label {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 7px; color: rgba(255,255,255,0.85); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-top: 2px;
    }
    .front-field-line {
      border-bottom: 1.5px dotted rgba(255,255,255,0.5);
      height: 16px; margin-bottom: 2px;
    }
    .front-footer-strip {
      margin-top: auto;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 5px; color: rgba(255,255,255,0.45);
      text-align: right; letter-spacing: 0.5px;
    }

    /* Decorative sparkles on front */
    .front-deco {
      position: absolute; z-index: 2; pointer-events: none;
    }
    .front-star-tl { top: 5px; left: 6px; font-size: 8px; opacity: 0.4; }
    .front-star-tr { top: 5px; right: 8px; font-size: 9px; opacity: 0.5; }
    .front-star-br { bottom: 8px; right: 8px; font-size: 7px; opacity: 0.35; }

    /* ====================================================
       BACK SIDE — Matching screen.png reference exactly:
       - Full gradient background (yellow → orange → pink)
       - Large mascot centered
       - Floating coins & stars
       - Dot pattern overlay
       - CLEAN design, NO instruction box
       ==================================================== */
    .card-back {
      background: linear-gradient(135deg, #FFD60A 0%, #FF9F1C 50%, #F72585 100%);
      display: flex;
      align-items: center; justify-content: center;
      color: #fff;
      border: 3px solid #FFD60A;
    }
    /* Dot pattern overlay */
    .card-back::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.3) 2px, transparent 2px);
      background-size: 16px 16px;
      pointer-events: none; z-index: 0;
    }

    /* — Decorative floating elements — */
    .deco {
      position: absolute; z-index: 2; pointer-events: none;
    }
    .deco-coin-tl {
      top: 8px; left: 8px; width: 32px; height: 32px;
      opacity: 0.8; object-fit: contain;
    }
    .deco-star-tr {
      top: 8px; right: 10px;
      font-size: 22px; opacity: 0.85;
      color: #FFE171;
    }
    .deco-star-bl {
      bottom: 18px; left: 8px;
      font-size: 18px; opacity: 0.6;
      color: #fff;
    }
    .deco-coin-br {
      bottom: 10px; right: 10px; width: 36px; height: 36px;
      opacity: 0.75; object-fit: contain;
      transform: rotate(12deg);
    }

    /* — Center: Large Mascot — */
    .back-mascot-container {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .back-mascot-img {
      width: 120px; height: 120px; object-fit: contain;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.25));
    }
  </style>
</head>
<body>
  <div class="no-print container" style="padding:20px 20px 0;">
    <div class="flex-between">
      <h1 class="h2" style="font-family:'Quicksand',sans-serif;">🖨️ Cetak Kartu QR</h1>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    </div>
    <p class="caption text-secondary" style="margin-top:8px;font-family:'Nunito Sans',sans-serif;">
      ✂️ Gunting → Tempel depan &amp; belakang → Laminating!
    </p>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
  </div>

  <div class="print-grid" id="qrGrid">
    <div class="loading-state"><div class="spinner"></div><p>Generating QR codes...</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    (function() {
      const BASE_URL = window.location.origin;
      const grid = document.getElementById('qrGrid');
      const qrIds = JSON.parse(sessionStorage.getItem('celdig_print_qrs') || '[]');

      if (!qrIds.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;font-family:Quicksand,sans-serif;">Tidak ada QR Code untuk dicetak.<br>Generate dari halaman Admin terlebih dahulu.</p>';
        return;
      }

      // Coin & mascot images from the reference design
      const coinImg = 'https://lh3.googleusercontent.com/aida-public/AB6AXuBZz2ZD2_QZ2w5J26s8JPFuUvEnB33LWeUm5X8Kk8lNb8OvLXSHR1o6b-vSB6kRsgIMX9h2E5ikjaL5l2jf4hnx1vQ_6HL--ugsK0SJS0DHIKXpAQPFbVgtPuOKwwG8AlzPfjlPLoCG2Yebd4Q52OEftfjDtCOJBakce3nyHM7cC6Vp19-GF3kYn3p3qhVv2ZOiWVJzFQa5n8mijlGE0FlNeKuiqiU5yuSxODOiyFEDx_NpC1Nm-OIDuw';
      const mascotImg = 'https://lh3.googleusercontent.com/aida-public/AB6AXuBxXWQzib596xfoO6iUIJQxuRLr2x2F0RV2rXl0W1vV8oCHVdhQYE21o8PQdIGfKuia8ELHjsF5vFwIq651kZHoBbsGOx2Q7_dkU_crFLp7LNJczYu1lwNDp8Sy8ZHqTZa6RcSYLxJZ9ha9pDW_Xek3sNWspsWx_AU4cBqTd7VNhzi_QQsUpsH0aRvHRGqdz6rQINAuxzrH34GvRLxEGwOzzru4lzVonfUtgL7X55HU4quCK1PCWytpauooRpq_2fs_z5Q';

      grid.innerHTML = '';

      qrIds.forEach((id) => {
        const url = `${BASE_URL}/s/${id}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(url)}&color=FFFFFF&bgcolor=00000000`;

        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `
          <div>
            <!-- ========== FRONT CARD (Blue/Cyan ATM style) ========== -->
            <div class="card-front">
              <!-- Decorative sparkles -->
              <span class="front-deco front-star-tl">⭐</span>
              <span class="front-deco front-star-tr">⭐✨</span>
              <span class="front-deco front-star-br">✨</span>

              <div class="front-qr-zone">
                <img class="qr-img" src="${qrImgUrl}" alt="QR ${id}">
                <div class="front-qr-label">Scan Me!</div>
              </div>
              <div class="front-info-zone">
                <div class="front-brand">
                  <span class="mascot-emoji">🐱</span>
                  <span class="brand-title">CELDIG</span>
                </div>
                <div class="front-subtitle">Celengan Digital</div>
                <div class="front-field-label">Nama:</div>
                <div class="front-field-line"></div>
                <div class="front-field-label">Kelas:</div>
                <div class="front-field-line"></div>
                <div class="front-footer-strip">ID: ${id.substring(0, 8)}</div>
              </div>
            </div>
            <div class="card-label">▲ DEPAN</div>
          </div>

          <div>
            <!-- ========== BACK CARD (Gradient + Large Mascot centered) ========== -->
            <div class="card-back">
              <!-- Floating decorative elements -->
              <img class="deco deco-coin-tl" src="${coinImg}" alt="">
              <span class="deco deco-star-tr material-symbols-outlined" style='font-variation-settings:"FILL" 1;'>star</span>
              <span class="deco deco-star-bl material-symbols-outlined" style='font-variation-settings:"FILL" 1;'>stars</span>
              <img class="deco deco-coin-br" src="${coinImg}" alt="">

              <!-- Large centered mascot -->
              <div class="back-mascot-container">
                <img class="back-mascot-img" src="${mascotImg}" alt="Mascot">
              </div>
            </div>
            <div class="card-label">▲ BELAKANG</div>
          </div>
        `;
        grid.appendChild(wrapper);
      });
    })();
  </script>
</body>
</html>
