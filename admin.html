<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Admin Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- PIN Login Screen -->
  <div id="pinScreen" class="flex-center flex-col" style="min-height:100dvh; background:linear-gradient(135deg,#4CC9F0,#3A86FF); color:#fff; padding:24px;">
    <div style="font-size:64px; margin-bottom:16px;" class="animate-bounce-in">🔐</div>
    <h1 class="h1" style="margin-bottom:8px;">CELDIG Admin</h1>
    <p class="body" style="opacity:0.8; margin-bottom:32px;">Masukkan PIN untuk melanjutkan</p>
    <div class="pin-container" id="pinContainer"></div>
    <p id="pinError" class="caption hidden" style="color:#FFD6D6; margin-top:12px;">PIN salah, coba lagi</p>
    <button id="pinSubmit" class="btn btn-block" style="background:rgba(255,255,255,0.2); color:#fff; margin-top:24px; max-width:280px;">Masuk</button>
  </div>

  <!-- Dashboard (hidden until PIN verified) -->
  <div id="dashboardScreen" class="hidden">
    <header class="topbar">
      <div class="flex items-center gap-xs">
        <span style="font-size:28px;">🐱</span>
        <span class="topbar-title">Admin</span>
      </div>
      <button class="topbar-action" id="logoutBtn" title="Logout">🚪</button>
    </header>

    <main class="container flex-col pb-nav" style="padding-top:24px; gap:20px;">
      <!-- Stats -->
      <div class="stat-card animate-slide-up" style="padding:24px;">
        <p class="label" style="opacity:0.8;">💰 Total Tabungan</p>
        <p class="nominal" id="statTotal" style="margin-top:4px;">Rp 0</p>
      </div>
      <div class="stat-row animate-slide-up delay-1" style="gap:14px;">
        <div class="stat-box" style="padding:18px;">
          <p class="label">Total Siswa</p>
          <p class="h2" id="statStudents" style="margin-top:6px;">0</p>
        </div>
        <div class="stat-box" style="padding:18px;">
          <p class="label">Total Setoran</p>
          <p class="h2" id="statDeposits" style="margin-top:6px;">0</p>
        </div>
      </div>

      <!-- Generate QR -->
      <div class="card card-accent animate-slide-up delay-2" style="padding:24px;">
        <h3 class="h3" style="margin-bottom:8px;">🎫 Generate QR Code</h3>
        <p class="caption text-secondary" style="margin-bottom:16px;">Buat QR baru untuk siswa yang belum punya</p>
        <div class="flex gap-xs">
          <input class="form-input" id="qrQuantity" type="number" min="1" max="50" value="10" style="max-width:100px;">
          <button class="btn btn-primary flex-1" id="generateBtn">🖨️ Cetak QR</button>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="flex animate-slide-up delay-3" style="gap:12px;">
        <a href="/leaderboard" class="btn btn-primary flex-1" style="font-size:13px;">🏆 Leaderboard</a>
        <button class="btn btn-secondary flex-1" id="openSheetBtn" style="font-size:13px;">📊 Spreadsheet</button>
      </div>

      <!-- Student Roster -->
      <div class="animate-slide-up delay-4" style="margin-top:4px;">
        <div class="flex-between" style="margin-bottom:14px;">
          <h3 class="h3">📋 Daftar Siswa</h3>
          <span class="caption text-secondary" id="studentCount">0 siswa</span>
        </div>
        <div id="studentList" class="flex-col" style="gap:10px;">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
