<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Leaderboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="lb-page">
  <!-- Canvas meteor shower -->
  <canvas id="meteorCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>

  <script>
  (function() {
    const canvas = document.getElementById('meteorCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Color palette ──
    const palette = [
      { r:255, g:215, b:0 },    // gold
      { r:76,  g:201, b:240 },   // cyan
      { r:255, g:255, b:255 },   // white
      { r:247, g:37,  b:133 },   // pink
      { r:160, g:120, b:255 },   // lavender
    ];

    // ── Twinkling Stars ──
    const stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * 2000,
        y: Math.random() * 1200,
        r: 0.4 + Math.random() * 1.2,
        alpha: Math.random(),
        speed: 0.003 + Math.random() * 0.015,
        phase: Math.random() * Math.PI * 2
      });
    }

    function drawStars(t) {
      for (const s of stars) {
        const a = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
      }
    }

    // ── Meteor class ──
    class Meteor {
      constructor() {
        this.reset();
      }
      reset() {
        const c = palette[Math.floor(Math.random() * palette.length)];
        this.cr = c.r; this.cg = c.g; this.cb = c.b;
        this.x = W * (0.3 + Math.random() * 0.7);
        this.y = -10 - Math.random() * H * 0.2;
        const angle = (210 + Math.random() * 30) * Math.PI / 180; // 210-240 deg
        const speed = 6 + Math.random() * 10;
        this.vx = Math.cos(angle) * speed;
        this.vy = -Math.sin(angle) * speed;
        this.size = 2 + Math.random() * 3;
        this.tailLen = 20 + Math.random() * 35;
        this.trail = [];
        this.life = 1;
        this.decay = 0.004 + Math.random() * 0.006;
        this.active = true;
      }
      update() {
        this.trail.push({ x: this.x, y: this.y, life: 1 });
        if (this.trail.length > this.tailLen) this.trail.shift();
        for (const p of this.trail) p.life -= 0.03;
        this.trail = this.trail.filter(p => p.life > 0);
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        if (this.life <= 0 || this.x < -100 || this.y > H + 100) {
          this.active = false;
        }
      }
      draw() {
        // Draw trail
        for (let i = 0; i < this.trail.length; i++) {
          const p = this.trail[i];
          const progress = i / this.trail.length;
          const alpha = p.life * progress * this.life * 0.6;
          const sz = this.size * progress * 0.8;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(0.3, sz), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${this.cr},${this.cg},${this.cb},${alpha})`;
          ctx.fill();
        }
        // Draw glowing head
        const a = Math.min(1, this.life);
        // outer glow
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 6);
        grad.addColorStop(0, `rgba(${this.cr},${this.cg},${this.cb},${a * 0.5})`);
        grad.addColorStop(0.4, `rgba(${this.cr},${this.cg},${this.cb},${a * 0.15})`);
        grad.addColorStop(1, `rgba(${this.cr},${this.cg},${this.cb},0)`);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 6, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        // bright core
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.cr},${this.cg},${this.cb},${a * 0.7})`;
        ctx.fill();
      }
    }

    // ── Meteor pool ──
    const meteors = [];
    let spawnTimer = 0;

    function spawnMeteor() {
      const m = new Meteor();
      meteors.push(m);
    }

    // ── Animation loop ──
    let t = 0;
    function animate() {
      t++;
      ctx.clearRect(0, 0, W, H);

      // Draw twinkling stars
      drawStars(t);

      // Spawn logic: random interval
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnMeteor();
        spawnTimer = 30 + Math.floor(Math.random() * 90); // every 0.5-2s at 60fps
      }

      // Update & draw meteors
      for (let i = meteors.length - 1; i >= 0; i--) {
        meteors[i].update();
        meteors[i].draw();
        if (!meteors[i].active) meteors.splice(i, 1);
      }

      requestAnimationFrame(animate);
    }

    // Start with initial burst
    for (let i = 0; i < 3; i++) spawnMeteor();
    animate();
  })();
  </script>

  <div style="position:relative; z-index:1;">
    <!-- Header -->
    <div class="lb-header">
      <h1 class="lb-title">🏆 PAPAN PERINGKAT CELDIG</h1>
      <p class="lb-subtitle" id="lbSubtitle">Bintang Terbanyak Minggu Ini! 🎉</p>
    </div>

    <!-- Period Tabs -->
    <div class="period-tabs">
      <button class="period-tab active" data-period="weekly">Minggu Ini</button>
      <button class="period-tab" data-period="monthly">Bulan Ini</button>
      <button class="period-tab" data-period="all">Keseluruhan</button>
    </div>

    <!-- Podium Top 3 -->
    <div class="podium" id="podium">
      <div class="loading-state"><div class="spinner"></div><p style="color:rgba(255,255,255,0.6)">Memuat ranking...</p></div>
    </div>

    <!-- Rank 4-10 -->
    <div class="rank-grid" id="rankGrid"></div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/leaderboard.js"></script>
</body>
</html>
