<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Leaderboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="lb-page">
  <style>
    /* ===== Epic Meteor Shower ===== */
    .meteors-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .meteor {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: meteorFly linear forwards;
    }
    /* Glowing head */
    .meteor .head {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--m-color, #fff);
      box-shadow:
        0 0 8px 3px var(--m-color, #fff),
        0 0 20px 6px var(--m-glow, rgba(255,255,255,0.4));
    }
    /* Long gradient tail */
    .meteor .tail {
      position: absolute;
      top: 50%; right: 100%;
      transform: translateY(-50%);
      height: var(--tail-h, 2px);
      width: var(--tail-w, 120px);
      background: linear-gradient(90deg, transparent, var(--m-glow, rgba(255,255,255,0.3)) 30%, var(--m-color, #fff));
      border-radius: 999px;
      filter: blur(0.5px);
    }

    @keyframes meteorFly {
      0%   { opacity: 0; transform: translate(0, 0) rotate(var(--angle, -35deg)); }
      8%   { opacity: 1; }
      75%  { opacity: 0.8; }
      100% { opacity: 0; transform: translate(var(--dx, -900px), var(--dy, 700px)) rotate(var(--angle, -35deg)); }
    }
  </style>

  <!-- Sparkles background -->
  <div id="sparkles" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

  <!-- Meteor shower container -->
  <div class="meteors-container" id="meteorContainer"></div>

  <script>
  (function(){
    const container = document.getElementById('meteorContainer');
    const colors = [
      { color: '#FFD700', glow: 'rgba(255,215,0,0.5)' },     // gold
      { color: '#4CC9F0', glow: 'rgba(76,201,240,0.5)' },     // cyan
      { color: '#fff',    glow: 'rgba(255,255,255,0.4)' },     // white
      { color: '#F72585', glow: 'rgba(247,37,133,0.4)' },     // pink
      { color: '#7B2FF7', glow: 'rgba(123,47,247,0.4)' },     // purple
    ];

    function spawnMeteor() {
      const el = document.createElement('div');
      el.className = 'meteor';
      const c = colors[Math.floor(Math.random() * colors.length)];
      const size = 3 + Math.random() * 4;           // 3-7px head
      const tailW = 80 + Math.random() * 160;       // 80-240px tail
      const tailH = 1.5 + Math.random() * 1.5;      // 1.5-3px tail thickness
      const dur = 1 + Math.random() * 2;            // 1-3s flight
      const angle = -25 - Math.random() * 25;       // -25 to -50 deg
      const startX = 20 + Math.random() * 80;       // 20-100% from left
      const startY = -5 + Math.random() * 30;       // -5% to 25% from top
      const dx = -(500 + Math.random() * 600);
      const dy = 400 + Math.random() * 500;

      el.style.cssText = `
        left:${startX}%; top:${startY}%;
        width:${size}px; height:${size}px;
        --m-color:${c.color}; --m-glow:${c.glow};
        --tail-w:${tailW}px; --tail-h:${tailH}px;
        --angle:${angle}deg; --dx:${dx}px; --dy:${dy}px;
        animation-duration:${dur}s;
      `;
      el.innerHTML = '<div class="head"></div><div class="tail"></div>';
      container.appendChild(el);

      // Clean up after animation ends
      el.addEventListener('animationend', () => el.remove());
    }

    // Spawn meteors at random intervals
    function scheduleNext() {
      const delay = 400 + Math.random() * 1800; // 0.4-2.2s between meteors
      setTimeout(() => {
        spawnMeteor();
        scheduleNext();
      }, delay);
    }

    // Start with a burst of 3
    for (let i = 0; i < 3; i++) setTimeout(spawnMeteor, i * 300);
    scheduleNext();
  })();
  </script>

  <div style="position:relative; z-index:1;">
    <!-- Header -->
    <div class="lb-header">
      <h1 class="lb-title">🏆 PAPAN PERINGKAT CELDIG</h1>
      <p class="lb-subtitle" id="lbSubtitle">Bintang Terbanyak Minggu Ini! 🎉</p>
    </div>

    <!-- Period Tabs -->
    <div class="period-tabs">
      <button class="period-tab active" data-period="weekly">Minggu Ini</button>
      <button class="period-tab" data-period="monthly">Bulan Ini</button>
      <button class="period-tab" data-period="all">Keseluruhan</button>
    </div>

    <!-- Podium Top 3 -->
    <div class="podium" id="podium">
      <div class="loading-state"><div class="spinner"></div><p style="color:rgba(255,255,255,0.6)">Memuat ranking...</p></div>
    </div>

    <!-- Rank 4-10 -->
    <div class="rank-grid" id="rankGrid"></div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/leaderboard.js"></script>
</body>
</html>
