<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELDIG — Leaderboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="lb-page">
  <style>
    /* ===== Shooting Stars / Meteor Animation ===== */
    .meteors-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .meteor {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.6);
      opacity: 0;
      transform: rotate(-45deg);
    }
    .meteor::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 1.5px;
      background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
      transform: translateX(-100%);
      border-radius: 999px;
    }

    @keyframes shootingStar {
      0%   { opacity: 0; transform: translate(0, 0) rotate(-45deg); }
      5%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-600px, 600px) rotate(-45deg); }
    }

    /* --- Individual meteor instances --- */
    .meteor:nth-child(1) {
      top: 5%; left: 70%;
      animation: shootingStar 2.2s ease-in 1s infinite;
    }
    .meteor:nth-child(1)::before { width: 80px; }

    .meteor:nth-child(2) {
      top: 12%; left: 90%;
      animation: shootingStar 2.8s ease-in 4.5s infinite;
    }
    .meteor:nth-child(2)::before { width: 50px; }

    .meteor:nth-child(3) {
      top: 2%; left: 50%;
      animation: shootingStar 1.8s ease-in 7s infinite;
    }
    .meteor:nth-child(3)::before { width: 100px; height: 2px; }

    .meteor:nth-child(4) {
      top: 18%; left: 80%;
      animation: shootingStar 3s ease-in 3s infinite;
    }
    .meteor:nth-child(4)::before { width: 40px; }

    .meteor:nth-child(5) {
      top: 8%; left: 40%;
      animation: shootingStar 2.5s ease-in 9s infinite;
    }
    .meteor:nth-child(5)::before { width: 70px; }

    .meteor:nth-child(6) {
      top: 25%; left: 95%;
      animation: shootingStar 2s ease-in 6s infinite;
    }
    .meteor:nth-child(6)::before { width: 90px; height: 2px; }

    .meteor:nth-child(7) {
      top: 0%; left: 60%;
      animation: shootingStar 3.2s ease-in 11s infinite;
    }
    .meteor:nth-child(7)::before { width: 55px; }

    .meteor:nth-child(8) {
      top: 15%; left: 30%;
      animation: shootingStar 2.4s ease-in 14s infinite;
    }
    .meteor:nth-child(8)::before { width: 65px; }
  </style>

  <!-- Sparkles background -->
  <div id="sparkles" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

  <!-- Shooting stars / Meteors -->
  <div class="meteors-container">
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
  </div>

  <div style="position:relative; z-index:1;">
    <!-- Header -->
    <div class="lb-header">
      <h1 class="lb-title">🏆 PAPAN PERINGKAT CELDIG</h1>
      <p class="lb-subtitle" id="lbSubtitle">Bintang Terbanyak Minggu Ini! 🎉</p>
    </div>

    <!-- Period Tabs -->
    <div class="period-tabs">
      <button class="period-tab active" data-period="weekly">Minggu Ini</button>
      <button class="period-tab" data-period="monthly">Bulan Ini</button>
      <button class="period-tab" data-period="all">Keseluruhan</button>
    </div>

    <!-- Podium Top 3 -->
    <div class="podium" id="podium">
      <div class="loading-state"><div class="spinner"></div><p style="color:rgba(255,255,255,0.6)">Memuat ranking...</p></div>
    </div>

    <!-- Rank 4-10 -->
    <div class="rank-grid" id="rankGrid"></div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/leaderboard.js"></script>
</body>
</html>
